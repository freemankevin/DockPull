services:
  app:
    image: ghcr.io/freemankevin/dockpull:latest
    build:
      context: .
    ports:
      - "19238:9238"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./exports:/app/exports
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVER_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9238/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s